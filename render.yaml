services:
  - type: web
    name: noted-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: noted-db
          property: connectionString

databases:
  - name: noted-db
    plan: free
    databaseName: noted
